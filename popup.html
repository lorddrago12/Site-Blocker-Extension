<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Site Blocker</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ════════════════════════════════
       THEMES
    ════════════════════════════════ */

    :root, [data-theme="dark"] {
      --bg:               #0d0d0d;
      --surface:          #141414;
      --border:           #1f1f1f;
      --border-hover:     #2e2e2e;
      --accent:           #e8ff47;
      --accent-dim:       rgba(232,255,71,0.08);
      --accent-text:      #0d0d0d;
      --danger:           #ff4444;
      --danger-dim:       rgba(255,68,68,0.08);
      --text:             #e0e0e0;
      --text-muted:       #555;
      --text-dim:         #252525;
      --scrollbar:        #1f1f1f;
    }
    [data-theme="mocha"] {
      --bg:               #1e1e2e;
      --surface:          #181825;
      --border:           #313244;
      --border-hover:     #45475a;
      --accent:           #cba6f7;
      --accent-dim:       rgba(203,166,247,0.1);
      --accent-text:      #1e1e2e;
      --danger:           #f38ba8;
      --danger-dim:       rgba(243,139,168,0.1);
      --text:             #cdd6f4;
      --text-muted:       #6c7086;
      --text-dim:         #313244;
      --scrollbar:        #313244;
    }
    [data-theme="dracula"] {
      --bg:               #282a36;
      --surface:          #21222c;
      --border:           #44475a;
      --border-hover:     #6272a4;
      --accent:           #50fa7b;
      --accent-dim:       rgba(80,250,123,0.08);
      --accent-text:      #282a36;
      --danger:           #ff5555;
      --danger-dim:       rgba(255,85,85,0.1);
      --text:             #f8f8f2;
      --text-muted:       #6272a4;
      --text-dim:         #44475a;
      --scrollbar:        #44475a;
    }
    [data-theme="nord"] {
      --bg:               #2e3440;
      --surface:          #3b4252;
      --border:           #434c5e;
      --border-hover:     #4c566a;
      --accent:           #88c0d0;
      --accent-dim:       rgba(136,192,208,0.1);
      --accent-text:      #2e3440;
      --danger:           #bf616a;
      --danger-dim:       rgba(191,97,106,0.1);
      --text:             #eceff4;
      --text-muted:       #616e88;
      --text-dim:         #434c5e;
      --scrollbar:        #434c5e;
    }
    [data-theme="rose-pine"] {
      --bg:               #191724;
      --surface:          #1f1d2e;
      --border:           #26233a;
      --border-hover:     #403d52;
      --accent:           #ebbcba;
      --accent-dim:       rgba(235,188,186,0.08);
      --accent-text:      #191724;
      --danger:           #eb6f92;
      --danger-dim:       rgba(235,111,146,0.1);
      --text:             #e0def4;
      --text-muted:       #6e6a86;
      --text-dim:         #26233a;
      --scrollbar:        #26233a;
    }
    [data-theme="gruvbox"] {
      --bg:               #282828;
      --surface:          #32302f;
      --border:           #3c3836;
      --border-hover:     #504945;
      --accent:           #b8bb26;
      --accent-dim:       rgba(184,187,38,0.08);
      --accent-text:      #282828;
      --danger:           #fb4934;
      --danger-dim:       rgba(251,73,52,0.1);
      --text:             #ebdbb2;
      --text-muted:       #928374;
      --text-dim:         #3c3836;
      --scrollbar:        #3c3836;
    }
    [data-theme="tokyo"] {
      --bg:               #1a1b26;
      --surface:          #16161e;
      --border:           #292e42;
      --border-hover:     #3d59a1;
      --accent:           #7aa2f7;
      --accent-dim:       rgba(122,162,247,0.08);
      --accent-text:      #1a1b26;
      --danger:           #f7768e;
      --danger-dim:       rgba(247,118,142,0.1);
      --text:             #c0caf5;
      --text-muted:       #565f89;
      --text-dim:         #292e42;
      --scrollbar:        #292e42;
    }
    [data-theme="sammy"] {
      --bg:               #1a0a0f;
      --surface:          #240d15;
      --border:           #3a1a24;
      --border-hover:     #5a2a38;
      --accent:           #e8637a;
      --accent-dim:       rgba(232,99,122,0.10);
      --accent-text:      #1a0a0f;
      --danger:           #e8637a;
      --danger-dim:       rgba(232,99,122,0.10);
      --text:             #f0ccd4;
      --text-muted:       #8a4a58;
      --text-dim:         #3a1a24;
      --scrollbar:        #3a1a24;
    }

    /* ════════════════════════════════
       BASE
    ════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      transition: background 0.25s, color 0.25s;
    }

    /* ── Header ── */
    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon {
      width: 22px; height: 22px;
      background: var(--accent);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; flex-shrink: 0;
      transition: background 0.25s;
    }
    .logo-text {
      font-family: 'Space Mono', monospace;
      font-size: 11px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--text);
      transition: color 0.25s;
    }

    /* Toggle */
    .toggle-wrap {
      display: flex; align-items: center; gap: 7px;
      cursor: pointer; user-select: none;
    }
    .toggle-label {
      font-size: 10px; letter-spacing: 1px;
      text-transform: uppercase; color: var(--text-muted);
      font-family: 'Space Mono', monospace;
      transition: color 0.2s;
    }
    .toggle-wrap.active .toggle-label { color: var(--accent); }
    .toggle {
      width: 32px; height: 17px;
      background: var(--border);
      border-radius: 999px; position: relative;
      transition: background 0.2s; flex-shrink: 0;
    }
    .toggle.on { background: var(--accent); }
    .toggle::after {
      content: '';
      position: absolute; top: 2px; left: 2px;
      width: 13px; height: 13px;
      border-radius: 50%; background: var(--bg);
      transition: transform 0.2s, background 0.25s;
    }
    .toggle.on::after { transform: translateX(15px); }

    /* ── Theme strip ── */
    .theme-strip {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px;
      overflow-x: auto;
    }
    .theme-strip::-webkit-scrollbar { display: none; }
    .theme-strip-label {
      font-size: 9px; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--text-muted);
      font-family: 'Space Mono', monospace;
      white-space: nowrap; margin-right: 2px;
      flex-shrink: 0;
    }
    .theme-btn {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: transform 0.15s, border-color 0.15s;
      title: attr(data-label);
    }
    .theme-btn:hover { transform: scale(1.2); }
    .theme-btn.active {
      border-color: var(--text);
      transform: scale(1.15);
    }
    .theme-btn[data-theme="dark"]     { background: #e8ff47; }
    .theme-btn[data-theme="mocha"]    { background: #cba6f7; }
    .theme-btn[data-theme="sammy"]    { background: #e8637a; }
    .theme-btn[data-theme="dracula"]  { background: #50fa7b; }
    .theme-btn[data-theme="nord"]     { background: #88c0d0; }
    .theme-btn[data-theme="rose-pine"]{ background: #ebbcba; }
    .theme-btn[data-theme="gruvbox"]  { background: #b8bb26; }
    .theme-btn[data-theme="tokyo"]    { background: #7aa2f7; }

    /* ── Input area ── */
    .input-area {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
    }
    .input-row { display: flex; gap: 7px; }
    input[type="text"] {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 12px; padding: 8px 11px;
      font-family: 'Space Mono', monospace;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    input[type="text"]::placeholder { color: var(--text-dim); }
    input[type="text"]:focus {
      border-color: var(--accent);
      background: var(--bg);
    }
    button.add-btn {
      background: var(--accent); color: var(--accent-text);
      border: none; border-radius: 4px;
      padding: 8px 13px;
      font-size: 11px; font-weight: 700;
      font-family: 'Space Mono', monospace;
      letter-spacing: 1px; cursor: pointer;
      text-transform: uppercase;
      transition: opacity 0.15s, transform 0.1s, background 0.25s, color 0.25s;
      white-space: nowrap;
    }
    button.add-btn:hover { opacity: 0.85; }
    button.add-btn:active { transform: scale(0.97); }
    .error-msg {
      font-size: 10px; color: var(--danger);
      margin-top: 7px;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.5px; min-height: 14px;
    }

    /* ── List ── */
    .list-header {
      padding: 10px 16px 7px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .list-label {
      font-size: 9px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--text-muted);
      font-family: 'Space Mono', monospace;
    }
    .count-badge {
      background: var(--border); color: var(--text-muted);
      font-size: 9px; font-family: 'Space Mono', monospace;
      padding: 2px 7px; border-radius: 999px; letter-spacing: 1px;
      transition: background 0.25s, color 0.25s;
    }
    .count-badge.has-items {
      background: var(--accent-dim); color: var(--accent);
    }
    .list-container {
      max-height: 180px; overflow-y: auto;
      padding: 0 16px 12px;
    }
    .list-container::-webkit-scrollbar { width: 3px; }
    .list-container::-webkit-scrollbar-track { background: transparent; }
    .list-container::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

    .empty-state { padding: 24px 0; text-align: center; }
    .empty-icon { font-size: 22px; margin-bottom: 8px; opacity: 0.3; }
    .empty-text {
      font-size: 10px; color: var(--text-dim);
      letter-spacing: 1.5px; text-transform: uppercase;
      font-family: 'Space Mono', monospace;
    }
    .site-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 10px;
      background: var(--surface);
      border: 1px solid var(--border); border-radius: 4px;
      margin-bottom: 5px; gap: 9px;
      transition: border-color 0.15s, background 0.25s;
      animation: slideIn 0.15s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .site-item:hover { border-color: var(--border-hover); }
    .site-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--danger); flex-shrink: 0;
      box-shadow: 0 0 5px var(--danger);
      transition: background 0.25s, box-shadow 0.25s;
    }
    .site-domain {
      font-family: 'Space Mono', monospace;
      font-size: 11px; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      flex: 1;
    }
    button.remove-btn {
      background: transparent;
      border: 1px solid var(--border); color: var(--text-muted);
      border-radius: 4px; width: 22px; height: 22px;
      cursor: pointer; font-size: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      line-height: 1;
    }
    button.remove-btn:hover {
      background: var(--danger-dim);
      border-color: var(--danger); color: var(--danger);
    }

    /* ── Footer ── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 9px 16px;
      display: flex; justify-content: space-between; align-items: center;
      transition: border-color 0.25s;
    }
    .footer-note {
      font-size: 9px; color: var(--text-dim);
      font-family: 'Space Mono', monospace; letter-spacing: 0.5px;
    }
    .clear-all {
      background: transparent; border: none;
      color: var(--text-muted);
      font-size: 9px; font-family: 'Space Mono', monospace;
      letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; padding: 3px 0;
      transition: color 0.15s;
    }
    .clear-all:hover { color: var(--danger); }
    .clear-all:disabled { opacity: 0.3; cursor: default; }

    /* tooltip on theme buttons */
    .theme-btn::after {
      content: attr(data-label);
      position: absolute; bottom: -22px; left: 50%;
      transform: translateX(-50%);
      background: var(--surface); color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 8px; letter-spacing: 0.5px;
      padding: 2px 5px; border-radius: 3px;
      white-space: nowrap; pointer-events: none;
      opacity: 0; transition: opacity 0.15s;
      border: 1px solid var(--border);
      z-index: 10;
    }
    .theme-btn:hover::after { opacity: 1; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-icon">⛔</div>
      <span class="logo-text">Blocker</span>
    </div>
    <div class="toggle-wrap" id="toggleWrap">
      <span class="toggle-label" id="toggleLabel">ON</span>
      <div class="toggle on" id="toggleSwitch"></div>
    </div>
  </div>

  <div class="theme-strip">
    <span class="theme-strip-label">Theme</span>
    <button class="theme-btn active" data-theme="dark"      title="Dark"       data-label="Dark"></button>
    <button class="theme-btn"        data-theme="mocha"     title="Mocha"      data-label="Mocha"></button>
    <button class="theme-btn"        data-theme="dracula"   title="Dracula"    data-label="Dracula"></button>
    <button class="theme-btn"        data-theme="nord"      title="Nord"       data-label="Nord"></button>
    <button class="theme-btn"        data-theme="rose-pine" title="Rosé Pine"  data-label="Rosé Pine"></button>
    <button class="theme-btn"        data-theme="gruvbox"   title="Gruvbox"    data-label="Gruvbox"></button>
    <button class="theme-btn"        data-theme="tokyo"     title="Tokyo Night" data-label="Tokyo Night"></button>
    <button class="theme-btn"        data-theme="sammy"     title="Sammy 🦉"   data-label="Sammy 🦉"></button>
  </div>

  <div class="input-area">
    <div class="input-row">
      <input type="text" id="siteInput" placeholder="e.g. reddit.com" autocomplete="off" spellcheck="false" />
      <button class="add-btn" id="addBtn">+ Add</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="list-header">
    <span class="list-label">Blocked Sites</span>
    <span class="count-badge" id="countBadge">0</span>
  </div>
  <div class="list-container" id="siteList">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🌐</div>
      <div class="empty-text">No sites blocked</div>
    </div>
  </div>

  <div class="footer">
    <span class="footer-note">reload tab after changes</span>
    <button class="clear-all" id="clearAll" disabled>Clear all</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
